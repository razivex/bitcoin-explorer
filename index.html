<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitcoin Address Balance</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="card">
    <h1>Bitcoin Address Balance</h1>
    <p class="sub">Look up the current balance of any Bitcoin address using mempool.space.</p>

    <label for="address">Bitcoin address</label>
    <div class="row">
      <input
        id="address"
        type="text"
        placeholder="e.g. bc1q... or 1A1zP1..."
        spellcheck="false"
        autocomplete="off"
      />
      <button id="lookupBtn" type="button">Check</button>
    </div>

    <div id="error" class="error"></div>

    <section id="result" class="result" aria-live="polite">
      <button id="qrBtn" class="qr-btn" type="button" aria-label="Show address QR code" title="QR code">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm13-2h3v2h-3v-2zm0 4h3v2h-3v-2zm-4-4h2v2h-2v-2zm2 4h2v2h-2v-2zm-4 0h2v2h-2v-2zm4 4h2v2h-2v-2zm0-8h2v2h-2v-2z"/>
        </svg>
      </button>
      <div class="balance-btc" id="balanceBtc">0.00000000 BTC</div>
      <div class="balance-unconfirmed" id="balanceUnconfirmed"></div>
      <div class="meta" id="meta">
        <strong>Address:</strong> <span id="metaAddress"></span><br>
        <strong>Address Type:</strong> <span id="metaAddressType"></span><br>
        <strong>Transactions:</strong> <span id="metaTransactions"></span><br>
        <strong>Confirmations:</strong> <span id="metaConfirmations"></span><br>
        <strong>Confirmation Date:</strong> <span id="metaConfirmationDate"></span><br>
        <strong>Time Since Last Confirmation:</strong> <span id="timeSince">N/A</span>
      </div>
    </section>

    <p class="footer">
      Data from <a href="https://mempool.space" target="_blank" rel="noopener">mempool.space</a>
    </p>
  </main>

  <nav class="social-links" aria-label="Social links">
    <a href="https://github.com/razivex" target="_blank" rel="noopener noreferrer" aria-label="GitHub — razivex">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.09-.745.083-.73.083-.73 1.205.085 1.84 1.237 1.84 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.468-2.38 1.236-3.22-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.3 1.23.96-.267 1.98-.4 3-.405 1.02.005 2.04.138 3 .405 2.29-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.91 1.235 3.22 0 4.61-2.807 5.625-5.48 5.92.43.37.823 1.102.823 2.222 0 1.606-.015 2.898-.015 3.293 0 .32.218.694.825.576C20.565 21.796 24 17.297 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
    </a>
    <a href="https://x.com/AndreRvza" target="_blank" rel="noopener noreferrer" aria-label="X — AndreRvza">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
    </a>
  </nav>

  <div id="qrOverlay" class="qr-overlay" hidden>
    <div class="qr-modal">
      <canvas id="qrCanvas" aria-label="Address QR code"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
